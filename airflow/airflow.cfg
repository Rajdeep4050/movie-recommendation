[core]
# The folder where your airflow pipelines live
dags_folder = ${AIRFLOW_HOME}/dags

# The folder where airflow should store its log files
base_log_folder = ${AIRFLOW_HOME}/logs

# Airflow can store logs remotely in AWS S3, Google Cloud Storage or Elastic Search
# Uncomment for production
# remote_logging = True
# remote_base_log_folder = s3://my-bucket/airflow/logs

# The executor class that airflow should use
executor = SequentialExecutor

# The SqlAlchemy connection string to the metadata database
sql_alchemy_conn = sqlite:///${AIRFLOW_HOME}/airflow.db

# The amount of parallelism as a setting to the executor
parallelism = 4

# The number of task instances allowed to run concurrently per DAG
dag_concurrency = 2

# Are DAGs paused by default at creation
dags_are_paused_at_creation = True

# The maximum number of active DAG runs per DAG
max_active_runs_per_dag = 1

# Whether to load the default connections that ship with Airflow
load_default_connections = True

# Whether to load the examples that ship with Airflow
load_examples = False

# Plugins folder
plugins_folder = ${AIRFLOW_HOME}/plugins

[database]
# The SqlAlchemy connection string to the metadata database
sql_alchemy_conn = sqlite:///${AIRFLOW_HOME}/airflow.db

[webserver]
# The base url of your website as airflow cannot guess what domain or cname you are using
base_url = http://localhost:8080

# The ip specified when starting the web server
web_server_host = 0.0.0.0

# The port on which to run the web server
web_server_port = 8080

# Paths to the SSL certificate and key for the web server
# web_server_ssl_cert =
# web_server_ssl_key =

# Number of seconds the webserver waits before killing gunicorn master
web_server_master_timeout = 120

# Number of workers to refresh at a time
web_server_worker_refresh_interval = 30

# Secret key used to run your flask app
secret_key = your_secret_key_here_change_in_production

# Number of workers to run the Gunicorn web server
workers = 2

# Log files for the gunicorn webserver
access_logfile = ./airflow/logs/gunicorn-access.log
error_logfile = ./airflow/logs/gunicorn-error.log

[scheduler]
# Task instances listen for external kill signal
job_heartbeat_sec = 5

# The scheduler constantly tries to trigger new tasks
scheduler_heartbeat_sec = 5

# Number of seconds after which a DAG file is re-parsed
min_file_process_interval = 30

# How long before timing out a DagFileProcessor
dag_dir_list_interval = 300

# The number of seconds to wait between intervals of the scheduler
scheduler_health_check_threshold = 30

[email]
# Configuration for email alerts
# email_backend = airflow.utils.email.send_email_smtp

[smtp]
# If you want airflow to send emails on failures, configure SMTP
# smtp_host = smtp.gmail.com
# smtp_starttls = True
# smtp_ssl = False
# smtp_user = your-email@gmail.com
# smtp_password = your-app-password
# smtp_port = 587
# smtp_mail_from = airflow@example.com
